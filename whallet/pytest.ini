[pytest]
# Add parent directory to Python path so 'whallet' package can be imported
pythonpath = ..

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Show more detailed output
addopts =
    -v
    --tb=short
    --strict-markers

# Silence upstream deprecation warnings from eth-account on Python 3.12
filterwarnings =
    ignore:'collections\.abc\.ByteString' is deprecated:DeprecationWarning:eth_account

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    race_condition: Tests for race condition handling

# NOTE: NO sensitive data (credentials, API keys) in this file!
# All sensitive configuration should be in environment variables or .env files
