name: Cross-Platform Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gateway,dashboard,dev]"

      - name: Lint with ruff and black
        run: |
          ruff check .
          black --check --diff .
          mypy --ignore-missing-imports --disable-error-code misc overblick/

      - name: Run tests
        run: python -m pytest tests/ -v -m "not llm and not e2e and not llm_slow" --ignore=tests/test_dashboard_playwright.py --tb=short
